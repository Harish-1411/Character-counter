<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Counter</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">

<h2 class="text-2xl font-bold text-center mb-4 text-gray-700">
Character Counter
</h2>

<textarea 
id="textInput"
rows="5"
maxlength="200"
placeholder="Type your message..."
class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
></textarea>

<div class="flex justify-between mt-3 text-sm">

<span id="charCount" class="text-gray-600">
0 Characters
</span>

<span class="text-gray-400">
Max 200
</span>

</div>

</div>

<script>

let textarea = document.getElementById("textInput");
let charCount = document.getElementById("charCount");

textarea.addEventListener("input", function(){

let count = textarea.value.length;
charCount.textContent = count + " Characters";

if(count >= 200){
charCount.classList.remove("text-gray-600");
charCount.classList.add("text-red-500");
}else{
charCount.classList.remove("text-red-500");
charCount.classList.add("text-gray-600");
}

});

</script>

</body>
</html>
